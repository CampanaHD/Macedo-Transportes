<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Painel ACR</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    #map { height: 100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script>

const supabaseUrl = "https://yofrzgorwhvzjovqnrlt.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvZnJ6Z29yd2h2empvdnFucmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTM0NzcsImV4cCI6MjA5ODQ4OTQ3N30.7sdkE-FomxhQcUlVvvy8b4RA03K5JmPFoz6sh2M4T1s";
const client = supabase.createClient(supabaseUrl, supabaseKey);

const map = L.map('map').setView([-22.2, -49.9], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let marker;

async function load() {

  const { data } = await client
    .from("localizacoes")
    .select("*")
    .order("id", { ascending: false })
    .limit(1);

  if (!data || data.length === 0) return;

  const d = data[0];

  if (!marker) {
    marker = L.marker([d.lat, d.lng]).addTo(map);
  } else {
    marker.setLatLng([d.lat, d.lng]);
  }

  map.setView([d.lat, d.lng]);

}

setInterval(load, 3000);

</script>

</body>
</html>
