<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Motorista</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="font-family:Arial;text-align:center;padding:30px">

<h2>GPS Motorista</h2>

<input id="motorista" placeholder="CAMINHAO_01" />

<br><br>

<button onclick="start()">INICIAR RASTREAMENTO</button>

<p id="status">parado</p>

<script>

// 🔥 1. CRIA CLIENTE CORRETO (NUNCA "supabase =")
const sb = supabase.createClient(
  "https://yofrzgorwhvzjovqnrlt.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvZnJ6Z29yd2h2empvdnFucmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTM0NzcsImV4cCI6MjA5ODQ4OTQ3N30.7sdkE-FomxhQcUlVvvy8b4RA03K5JmPFoz6sh2M4T1s"
);

// 🔥 2. FUNÇÃO GLOBAL (PRECISA ESTAR FORA)
window.start = function () {

  const motorista = document.getElementById("motorista").value;

  if (!motorista) {
    alert("Digite o ID do caminhão");
    return;
  }

  document.getElementById("status").innerText = "🟢 rastreando";

  navigator.geolocation.watchPosition(async (pos) => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    console.log("GPS:", lat, lng);

    const { error } = await sb.from("localizacoes").insert([{
      motorista,
      lat,
      lng,
      velocidade: pos.coords.speed || 0
    }]);

    if (error) {
      console.log("ERRO SUPABASE:", error);
    }

  }, (err) => {
    console.log("ERRO GPS:", err);
  }, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 10000
  });

}

</script>

</body>
</html>
