<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Motorista GPS</title>
</head>

<body style="font-family:Arial;text-align:center;padding:30px">

<h2>ACR Tracking</h2>

<button onclick="start()">INICIAR GPS</button>

<p id="status">Parado</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://yofrzgorwhvzjovqnrlt.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvZnJ6Z29yd2h2empvdnFucmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTM0NzcsImV4cCI6MjA5ODQ4OTQ3N30.7sdkE-FomxhQcUlVvvy8b4RA03K5JmPFoz6sh2M4T1s";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let motorista = "CAMINHAO_01";

function start() {

  document.getElementById("status").innerText = "Rastreando...";

  navigator.geolocation.watchPosition(async (pos) => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const speed = pos.coords.speed || 0;

    await client.from("localizacoes").insert([{
      motorista,
      lat,
      lng,
      velocidade: speed
    }]);

  }, err => console.log(err), {
    enableHighAccuracy: true,
    maximumAge: 0
  });

}
</script>

</body>
</html>
